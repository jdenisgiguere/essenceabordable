<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Essence abordable au Québec</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0c0e13;
    color: #e4e4e7;
    overflow: hidden;
    height: 100vh;
  }

  button {
    font: inherit;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  #app, .app-shell, .route-shell {
    width: 100%;
    height: 100vh;
  }

  .route-shell {
    position: relative;
  }

  .map {
    width: 100%;
    height: 100vh;
  }

  .header-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
    background: linear-gradient(to bottom, rgba(12,14,19,0.92) 0%, rgba(12,14,19,0.6) 70%, transparent 100%);
    padding: 16px 24px 32px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    pointer-events: none;
  }

  .header-bar > * { pointer-events: auto; }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 2px 12px rgba(34,197,94,0.3);
  }

  .brand h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #fff;
  }

  .brand p {
    font-size: 11px;
    color: #a1a1aa;
    margin-top: 1px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .route-nav {
    display: flex;
    gap: 8px;
    padding: 4px;
    border-radius: 10px;
    background: rgba(12,14,19,0.78);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(16px);
  }

  .route-link {
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    color: #a1a1aa;
    transition: background 0.2s, color 0.2s;
  }

  .route-link.router-link-active {
    background: rgba(34,197,94,0.15);
    color: #22c55e;
  }

  .app-nav-shell {
    position: absolute;
    top: 16px;
    right: 24px;
    z-index: 20;
  }

  .legend-bar {
    position: absolute;
    bottom: 32px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: rgba(12,14,19,0.88);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .legend-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #71717a;
    font-weight: 600;
    white-space: nowrap;
  }

  .legend-gradient {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .legend-gradient .bar {
    width: 140px;
    height: 10px;
    border-radius: 5px;
    background: linear-gradient(to right, #22c55e, #eab308, #ef4444);
  }

  .legend-gradient span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #a1a1aa;
    font-weight: 500;
  }

  .gas-select-group {
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    padding: 3px;
  }

  .gas-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: transparent;
    color: #a1a1aa;
    transition: all 0.2s;
  }

  .gas-btn.active {
    background: rgba(34,197,94,0.15);
    color: #22c55e;
  }

  .gas-btn:hover:not(.active) {
    color: #e4e4e7;
  }

  .maplibregl-popup-content {
    background: rgba(12,14,19,0.94) !important;
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1) !important;
    border-radius: 12px !important;
    padding: 16px !important;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5) !important;
    color: #e4e4e7;
    font-family: 'DM Sans', sans-serif;
    min-width: 220px;
  }

  .maplibregl-popup-tip {
    border-top-color: rgba(12,14,19,0.94) !important;
  }

  .maplibregl-popup-close-button {
    color: #a1a1aa !important;
    font-size: 18px !important;
    right: 8px !important;
    top: 6px !important;
  }

  .popup-name {
    font-weight: 700;
    font-size: 14px;
    color: #fff;
    margin-bottom: 4px;
    padding-right: 16px;
  }

  .popup-brand {
    font-size: 11px;
    color: #71717a;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 10px;
  }

  .popup-address {
    font-size: 12px;
    color: #a1a1aa;
    margin-bottom: 12px;
  }

  .popup-prices {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .popup-price-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    background: rgba(255,255,255,0.04);
    border-radius: 6px;
  }

  .popup-price-row.highlight {
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.2);
  }

  .popup-gas-type {
    font-size: 12px;
    color: #a1a1aa;
  }

  .popup-price-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
  }

  .popup-price-row.highlight .popup-price-val {
    color: #22c55e;
  }

  .loading-overlay {
    position: absolute;
    inset: 0;
    z-index: 100;
    background: #0c0e13;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.5s;
  }

  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.08);
    border-top-color: #22c55e;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 14px;
    color: #71717a;
  }

  .info-chip {
    position: absolute;
    top: 16px; right: 16px;
    z-index: 10;
    background: rgba(12,14,19,0.88);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px 16px;
    pointer-events: auto;
  }

  .info-chip .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
  }

  .info-chip .label {
    font-size: 11px;
    color: #71717a;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .placeholder-route {
    display: grid;
    place-items: center;
    min-height: 100vh;
    padding: 24px;
    background:
      radial-gradient(circle at top left, rgba(34,197,94,0.12), transparent 30%),
      radial-gradient(circle at bottom right, rgba(234,179,8,0.1), transparent 35%),
      #0c0e13;
  }

  .placeholder-card {
    max-width: 420px;
    padding: 28px;
    background: rgba(12,14,19,0.88);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    backdrop-filter: blur(16px);
    box-shadow: 0 18px 60px rgba(0,0,0,0.35);
  }

  .placeholder-card h2 {
    margin-bottom: 10px;
    font-size: 22px;
    color: #fff;
  }

  .placeholder-card p {
    font-size: 14px;
    line-height: 1.5;
    color: #a1a1aa;
  }

  @media (max-width: 900px) {
    .header-bar {
      flex-direction: column;
      gap: 12px;
    }

    .legend-bar {
      left: 16px;
      right: 16px;
      bottom: 16px;
      transform: none;
      flex-wrap: wrap;
      justify-content: center;
      padding: 14px 16px;
      gap: 12px;
    }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
const { createApp, ref, shallowRef, onMounted, onBeforeUnmount, watch, nextTick } = Vue;
const { createRouter, createWebHashHistory, RouterLink, RouterView } = VueRouter;

const COLOR_STOPS = [
  [130, '#22c55e'],
  [155, '#84cc16'],
  [170, '#eab308'],
  [185, '#f97316'],
  [200, '#ef4444']
];

const GAS_TYPES = ['Régulier', 'Super', 'Diesel'];

function buildColorExpr(property, min, max) {
  if (min === max) {
    return [
      'case',
      ['==', ['get', property], min], '#eab308',
      '#52525b'
    ];
  }

  const mid = min + (max - min) / 2;

  return [
    'interpolate', ['linear'], ['get', property],
    min, '#22c55e',
    mid, '#eab308',
    max, '#ef4444'
  ];
}

function preprocessData(geojson, gasType) {
  return {
    type: 'FeatureCollection',
    features: geojson.features
      .filter((feature) => feature.geometry && feature.geometry.coordinates)
      .map((feature) => {
        const prices = feature.properties.Prices || [];
        const match = prices.find((price) => price.GasType === gasType && price.IsAvailable);
        const normalizedPrice = match
          ? parseFloat(String(match.Price).replace(/[^0-9.]/g, ''))
          : null;

        return {
          type: 'Feature',
          geometry: feature.geometry,
          properties: {
            ...feature.properties,
            _price: normalizedPrice,
            Prices: JSON.stringify(prices)
          }
        };
      })
  };
}

function generateSampleData() {
  const regions = [
    { name: 'Montréal', center: [-73.57, 45.50], radius: 0.3, count: 180, priceBase: 165 },
    { name: 'Québec', center: [-71.21, 46.81], radius: 0.2, count: 80, priceBase: 170 },
    { name: 'Gatineau', center: [-75.70, 45.47], radius: 0.15, count: 50, priceBase: 168 },
    { name: 'Sherbrooke', center: [-71.89, 45.40], radius: 0.15, count: 40, priceBase: 172 },
    { name: 'Trois-Rivières', center: [-72.55, 46.35], radius: 0.1, count: 30, priceBase: 171 },
    { name: 'Saguenay', center: [-71.07, 48.43], radius: 0.2, count: 35, priceBase: 176 },
    { name: 'Rimouski', center: [-68.52, 48.45], radius: 0.15, count: 20, priceBase: 180 },
    { name: 'Abitibi', center: [-79.0, 48.1], radius: 0.4, count: 25, priceBase: 185 },
    { name: 'Côte-Nord', center: [-67.5, 49.2], radius: 0.5, count: 15, priceBase: 190 },
    { name: 'Laurentides', center: [-74.0, 46.1], radius: 0.3, count: 50, priceBase: 169 },
    { name: 'Lanaudière', center: [-73.5, 46.2], radius: 0.2, count: 35, priceBase: 170 },
    { name: 'Estrie', center: [-71.5, 45.3], radius: 0.25, count: 30, priceBase: 173 },
    { name: 'Bas-Saint-Laurent', center: [-69.0, 47.8], radius: 0.4, count: 25, priceBase: 178 },
    { name: 'Beauce', center: [-70.8, 46.1], radius: 0.2, count: 25, priceBase: 174 },
    { name: 'Gaspésie', center: [-65.5, 48.8], radius: 0.5, count: 20, priceBase: 192 }
  ];

  const brands = ['Ultramar', 'Petro-Canada', 'Shell', 'Esso', 'Couche-Tard', 'Canadian Tire', 'Costco', 'Harnois', 'Sonic', 'Aucun'];
  const streetNames = ['boul. des Laurentides', 'rue Principale', 'route 138', 'ch. Sainte-Foy', 'av. du Pont', 'boul. Saint-Joseph', 'rue King', 'route 117', 'boul. Taschereau', 'rue Sherbrooke'];

  const features = [];
  let id = 1;

  for (const region of regions) {
    for (let index = 0; index < region.count; index += 1) {
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.sqrt(Math.random()) * region.radius;
      const lng = region.center[0] + Math.cos(angle) * dist;
      const lat = region.center[1] + Math.sin(angle) * dist * 0.7;

      const regPrice = region.priceBase + (Math.random() - 0.5) * 30;
      const superPrice = regPrice + 15 + Math.random() * 15;
      const dieselPrice = regPrice + 20 + Math.random() * 20;

      features.push({
        type: 'Feature',
        geometry: { type: 'Point', coordinates: [lng, lat] },
        properties: {
          Name: `${brands[Math.floor(Math.random() * brands.length)]} — Station ${id}`,
          brand: brands[Math.floor(Math.random() * brands.length)],
          Status: 'En opération',
          Address: `${Math.floor(Math.random() * 9000) + 100} ${streetNames[Math.floor(Math.random() * streetNames.length)]}`,
          Region: region.name,
          Prices: [
            { GasType: 'Régulier', Price: `${regPrice.toFixed(1)}¢`, IsAvailable: true },
            { GasType: 'Super', Price: `${superPrice.toFixed(1)}¢`, IsAvailable: Math.random() > 0.1 },
            { GasType: 'Diesel', Price: `${dieselPrice.toFixed(1)}¢`, IsAvailable: Math.random() > 0.05 }
          ]
        }
      });

      id += 1;
    }
  }

  return { type: 'FeatureCollection', features };
}

const StationsMapView = {
  name: 'StationsMapView',
  setup() {
    const mapElement = ref(null);
    const map = shallowRef(null);
    const geojsonData = shallowRef(null);
    const currentGasType = ref('Régulier');
    const stationCount = ref('—');
    const isLoading = ref(true);
    const legendMin = ref('130.0¢');
    const legendMax = ref('200.0¢');

    let moveEndHandler = null;
    let zoomEndHandler = null;
    let clusterClickHandler = null;
    let stationClickHandler = null;
    let clusterEnterHandler = null;
    let clusterLeaveHandler = null;
    let stationEnterHandler = null;
    let stationLeaveHandler = null;

    function getVisiblePriceExtent() {
      if (!map.value || !map.value.getLayer('station-point')) {
        return null;
      }

      const features = map.value.queryRenderedFeatures({ layers: ['station-point'] });
      const prices = features
        .map((feature) => Number(feature.properties?._price))
        .filter((value) => Number.isFinite(value));

      if (!prices.length) {
        return null;
      }

      return {
        min: Math.min(...prices),
        max: Math.max(...prices)
      };
    }

    function updateViewportColorScale() {
      if (!map.value || !map.value.getLayer('station-point') || !map.value.getLayer('clusters')) {
        return;
      }

      const extent = getVisiblePriceExtent();
      if (!extent) {
        return;
      }

      map.value.setPaintProperty(
        'station-point',
        'circle-color',
        buildColorExpr('_price', extent.min, extent.max)
      );

      map.value.setPaintProperty(
        'clusters',
        'circle-color',
        buildColorExpr('min_price', extent.min, extent.max)
      );

      legendMin.value = `${extent.min.toFixed(1)}¢`;
      legendMax.value = `${extent.max.toFixed(1)}¢`;
    }

    function detachMapEvents() {
      if (!map.value) {
        return;
      }

      if (moveEndHandler) {
        map.value.off('moveend', moveEndHandler);
        moveEndHandler = null;
      }

      if (zoomEndHandler) {
        map.value.off('zoomend', zoomEndHandler);
        zoomEndHandler = null;
      }

      if (clusterClickHandler && map.value.getLayer('clusters')) {
        map.value.off('click', 'clusters', clusterClickHandler);
      }

      if (stationClickHandler && map.value.getLayer('station-point')) {
        map.value.off('click', 'station-point', stationClickHandler);
      }

      if (clusterEnterHandler && map.value.getLayer('clusters')) {
        map.value.off('mouseenter', 'clusters', clusterEnterHandler);
      }

      if (clusterLeaveHandler && map.value.getLayer('clusters')) {
        map.value.off('mouseleave', 'clusters', clusterLeaveHandler);
      }

      if (stationEnterHandler && map.value.getLayer('station-point')) {
        map.value.off('mouseenter', 'station-point', stationEnterHandler);
      }

      if (stationLeaveHandler && map.value.getLayer('station-point')) {
        map.value.off('mouseleave', 'station-point', stationLeaveHandler);
      }

      clusterClickHandler = null;
      stationClickHandler = null;
      clusterEnterHandler = null;
      clusterLeaveHandler = null;
      stationEnterHandler = null;
      stationLeaveHandler = null;
    }

    function applyData(gasType) {
      if (!map.value || !geojsonData.value || !map.value.isStyleLoaded()) {
        return;
      }

      const processed = preprocessData(geojsonData.value, gasType);
      stationCount.value = processed.features.length.toLocaleString('fr-CA');

      detachMapEvents();

      if (map.value.getLayer('cluster-label')) map.value.removeLayer('cluster-label');
      if (map.value.getLayer('clusters')) map.value.removeLayer('clusters');
      if (map.value.getLayer('station-label')) map.value.removeLayer('station-label');
      if (map.value.getLayer('station-point')) map.value.removeLayer('station-point');
      if (map.value.getSource('stations')) map.value.removeSource('stations');

      map.value.addSource('stations', {
        type: 'geojson',
        data: processed,
        cluster: true,
        clusterMaxZoom: 8,
        clusterRadius: 25,
        clusterProperties: {
          min_price: ['min', ['get', '_price']]
        }
      });

      const clusterColorExpr = ['interpolate', ['linear'], ['get', 'min_price'],
        ...COLOR_STOPS.flatMap(([value, color]) => [value, color])
      ];

      const pointColorExpr = ['interpolate', ['linear'], ['get', '_price'],
        ...COLOR_STOPS.flatMap(([value, color]) => [value, color])
      ];

      map.value.addLayer({
        id: 'clusters',
        type: 'circle',
        source: 'stations',
        filter: ['has', 'point_count'],
        paint: {
          'circle-color': clusterColorExpr,
          'circle-opacity': 0.85,
          'circle-radius': ['step', ['get', 'point_count'], 18, 5, 22, 20, 28, 100, 36],
          'circle-stroke-width': 2,
          'circle-stroke-color': 'rgba(0,0,0,0.3)'
        }
      });

      map.value.addLayer({
        id: 'cluster-label',
        type: 'symbol',
        source: 'stations',
        filter: ['has', 'point_count'],
        layout: {
          'text-field': ['concat', ['get', 'min_price'], '¢'],
          'text-size': 24,
          'text-allow-overlap': true
        },
        paint: {
          'text-color': '#fff',
          'text-halo-color': 'rgba(0,0,0,0.6)',
          'text-halo-width': 1
        }
      });

      map.value.addLayer({
        id: 'station-point',
        type: 'circle',
        source: 'stations',
        filter: ['!', ['has', 'point_count']],
        paint: {
          'circle-color': pointColorExpr,
          'circle-radius': 7,
          'circle-stroke-width': 2,
          'circle-stroke-color': 'rgba(0,0,0,0.4)',
          'circle-opacity': 0.9
        }
      });

      map.value.addLayer({
        id: 'station-label',
        type: 'symbol',
        source: 'stations',
        filter: ['!', ['has', 'point_count']],
        minzoom: 8,
        layout: {
          'text-field': [
            'concat',
            ['number-format', ['get', '_price'], { 'min-fraction-digits': 1, 'max-fraction-digits': 1 }],
            '¢'
          ],
          'text-size': 14,
          'text-offset': [0, 1.6]
        },
        paint: {
          'text-color': '#e4e4e7',
          'text-halo-color': 'rgba(12,14,19,0.8)',
          'text-halo-width': 1
        }
      });

      moveEndHandler = () => updateViewportColorScale();
      zoomEndHandler = () => updateViewportColorScale();
      map.value.on('moveend', moveEndHandler);
      map.value.on('zoomend', zoomEndHandler);

      clusterClickHandler = (event) => {
        const features = map.value.queryRenderedFeatures(event.point, { layers: ['clusters'] });
        if (!features.length) {
          return;
        }

        const clusterId = features[0].properties.cluster_id;
        map.value.getSource('stations').getClusterExpansionZoom(clusterId, (error, zoom) => {
          if (error) {
            return;
          }

          map.value.easeTo({ center: features[0].geometry.coordinates, zoom });
        });
      };

      stationClickHandler = (event) => {
        const feature = event.features[0];
        const props = feature.properties;
        let prices;

        try {
          prices = JSON.parse(props.Prices);
        } catch {
          prices = [];
        }

        const priceRows = prices.map((price) => {
          const isHighlight = price.GasType === gasType;
          return `<div class="popup-price-row ${isHighlight ? 'highlight' : ''}">
            <span class="popup-gas-type">${price.GasType}</span>
            <span class="popup-price-val">${price.Price}</span>
          </div>`;
        }).join('');

        new maplibregl.Popup({ offset: 12, maxWidth: '280px' })
          .setLngLat(feature.geometry.coordinates)
          .setHTML(`
            <div class="popup-name">${props.Name || 'Station'}</div>
            <div class="popup-brand">${props.brand || ''}</div>
            <div class="popup-address">${props.Address || ''}</div>
            <div class="popup-prices">${priceRows}</div>
          `)
          .addTo(map.value);
      };

      clusterEnterHandler = () => { map.value.getCanvas().style.cursor = 'pointer'; };
      clusterLeaveHandler = () => { map.value.getCanvas().style.cursor = ''; };
      stationEnterHandler = () => { map.value.getCanvas().style.cursor = 'pointer'; };
      stationLeaveHandler = () => { map.value.getCanvas().style.cursor = ''; };

      map.value.on('click', 'clusters', clusterClickHandler);
      map.value.on('click', 'station-point', stationClickHandler);
      map.value.on('mouseenter', 'clusters', clusterEnterHandler);
      map.value.on('mouseleave', 'clusters', clusterLeaveHandler);
      map.value.on('mouseenter', 'station-point', stationEnterHandler);
      map.value.on('mouseleave', 'station-point', stationLeaveHandler);

      updateViewportColorScale();
    }

    async function loadData() {
      let data;

      try {
        const remoteResponse = await fetch('https://regieessencequebec.ca/stations.geojson.gz');
        if (!remoteResponse.ok) {
          throw new Error(`HTTP ${remoteResponse.status}`);
        }

          data = await remoteResponse.json();
        } catch {
          console.warn('Failed to load live dataset, using sample data instead');
          data = generateSampleData();
        }
        geojsonData.value = data;
        applyData(currentGasType.value);
        isLoading.value = false;
      }




    onMounted(async () => {
      await nextTick();

      map.value = new maplibregl.Map({
        container: mapElement.value,
        style: {
          version: 8,
          sources: {
            carto: {
              type: 'raster',
              tiles: ['https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'],
              tileSize: 256,
              attribution: '© CartoDB © OpenStreetMap'
            }
          },
          layers: [{ id: 'carto-tiles', type: 'raster', source: 'carto' }],
          glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf'
        },
        center: [-72.5, 47.0],
        zoom: 5.5,
        maxZoom: 18
      });

      map.value.addControl(new maplibregl.NavigationControl(), 'bottom-right');
      map.value.on('load', loadData);
    });

    onBeforeUnmount(() => {
      detachMapEvents();
      if (map.value) {
        map.value.remove();
        map.value = null;
      }
    });

    watch(currentGasType, (gasType) => {
      applyData(gasType);
    });

    return {
      currentGasType,
      gasTypes: GAS_TYPES,
      isLoading,
      legendMin,
      legendMax,
      mapElement,
      stationCount
    };
  },
  template: `
    <div class="route-shell">
      <div class="loading-overlay" :class="{ hidden: !isLoading }">
        <div class="spinner"></div>
        <div class="loading-text">Chargement des stations…</div>
      </div>

      <div class="header-bar">
        <div class="brand">
          <div class="brand-icon">⛽</div>
          <div>
            <h1>Prix Essence Québec</h1>
            <p>Clusters par prix minimum</p>
          </div>
        </div>
      </div>

      <div class="info-chip">
        <div class="count">{{ stationCount }}</div>
        <div class="label">stations</div>
      </div>

      <div ref="mapElement" class="map"></div>

      <div class="legend-bar">
        <span class="legend-title">Prix min.</span>
        <div class="legend-gradient">
          <span>{{ legendMin }}</span>
          <div class="bar"></div>
          <span>{{ legendMax }}</span>
        </div>
        <div class="gas-select-group">
          <button
            v-for="gasType in gasTypes"
            :key="gasType"
            class="gas-btn"
            :class="{ active: gasType === currentGasType }"
            @click="currentGasType = gasType"
          >
            {{ gasType }}
          </button>
        </div>
      </div>
    </div>
  `
};

const ComparePlaceholderView = {
  name: 'ComparePlaceholderView',
  template: `
    <div class="placeholder-route">
      <div class="placeholder-card">
        <h2>Route de comparaison</h2>
        <p>
          Revenez plus tard!
        </p>
      </div>
    </div>
  `
};

const routes = [
  { path: '/', name: 'stations-map', component: StationsMapView },
  { path: '/compare', name: 'stations-compare', component: ComparePlaceholderView }
];

const router = createRouter({
  history: createWebHashHistory(),
  routes
});

const App = {
  name: 'AppShell',
  components: { RouterLink, RouterView },
  template: `
    <div class="app-shell">
      <div class="app-nav-shell">
        <nav class="route-nav" aria-label="Navigation dataviz">
          <RouterLink class="route-link" to="/">Carte</RouterLink>
          <RouterLink class="route-link" to="/compare">Comparaison</RouterLink>
        </nav>
      </div>
      <RouterView />
    </div>
  `
};

createApp(App).use(router).mount('#app');
</script>
</body>
</html>
