<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prix de l'essence — Québec</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0c0e13;
    color: #e4e4e7;
    overflow: hidden;
    height: 100vh;
  }

  #map { width: 100%; height: 100vh; }

  .header-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
    background: linear-gradient(to bottom, rgba(12,14,19,0.92) 0%, rgba(12,14,19,0.6) 70%, transparent 100%);
    padding: 16px 24px 32px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    pointer-events: none;
  }

  .header-bar > * { pointer-events: auto; }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 2px 12px rgba(34,197,94,0.3);
  }

  .brand h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #fff;
  }

  .brand p {
    font-size: 11px;
    color: #a1a1aa;
    margin-top: 1px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .legend-bar {
    position: absolute;
    bottom: 32px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: rgba(12,14,19,0.88);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .legend-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #71717a;
    font-weight: 600;
    white-space: nowrap;
  }

  .legend-gradient {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .legend-gradient .bar {
    width: 140px;
    height: 10px;
    border-radius: 5px;
    background: linear-gradient(to right, #22c55e, #eab308, #ef4444);
  }

  .legend-gradient span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #a1a1aa;
    font-weight: 500;
  }

  .gas-select-group {
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    padding: 3px;
  }

  .gas-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: transparent;
    color: #a1a1aa;
    transition: all 0.2s;
  }

  .gas-btn.active {
    background: rgba(34,197,94,0.15);
    color: #22c55e;
  }

  .gas-btn:hover:not(.active) {
    color: #e4e4e7;
  }

  .maplibregl-popup-content {
    background: rgba(12,14,19,0.94) !important;
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1) !important;
    border-radius: 12px !important;
    padding: 16px !important;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5) !important;
    color: #e4e4e7;
    font-family: 'DM Sans', sans-serif;
    min-width: 220px;
  }

  .maplibregl-popup-tip {
    border-top-color: rgba(12,14,19,0.94) !important;
  }

  .maplibregl-popup-close-button {
    color: #a1a1aa !important;
    font-size: 18px !important;
    right: 8px !important;
    top: 6px !important;
  }

  .popup-name {
    font-weight: 700;
    font-size: 14px;
    color: #fff;
    margin-bottom: 4px;
    padding-right: 16px;
  }

  .popup-brand {
    font-size: 11px;
    color: #71717a;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 10px;
  }

  .popup-address {
    font-size: 12px;
    color: #a1a1aa;
    margin-bottom: 12px;
  }

  .popup-prices {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .popup-price-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    background: rgba(255,255,255,0.04);
    border-radius: 6px;
  }

  .popup-price-row.highlight {
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.2);
  }

  .popup-gas-type {
    font-size: 12px;
    color: #a1a1aa;
  }

  .popup-price-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
  }

  .popup-price-row.highlight .popup-price-val {
    color: #22c55e;
  }

  .loading-overlay {
    position: absolute;
    inset: 0;
    z-index: 100;
    background: #0c0e13;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.5s;
  }

  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.08);
    border-top-color: #22c55e;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 14px;
    color: #71717a;
  }

  .info-chip {
    position: absolute;
    top: 16px; right: 16px;
    z-index: 10;
    background: rgba(12,14,19,0.88);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px 16px;
    pointer-events: auto;
  }

  .info-chip .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
  }

  .info-chip .label {
    font-size: 11px;
    color: #71717a;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<div id="loading" class="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">Chargement des stations…</div>
</div>

<div class="header-bar">
  <div class="brand">
    <div class="brand-icon">⛽</div>
    <div>
      <h1>Prix Essence Québec</h1>
      <p>Clusters par prix minimum</p>
    </div>
  </div>
</div>

<div class="info-chip">
  <div class="count" id="station-count">—</div>
  <div class="label">stations</div>
</div>

<div id="map"></div>

<div class="legend-bar">
  <span class="legend-title">Prix min.</span>
  <div class="legend-gradient">
    <span>130¢</span>
    <div class="bar"></div>
    <span>200¢</span>
  </div>
  <div class="gas-select-group">
    <button class="gas-btn active" data-gas="Régulier">Régulier</button>
    <button class="gas-btn" data-gas="Super">Super</button>
    <button class="gas-btn" data-gas="Diesel">Diesel</button>
  </div>
</div>

<script>
const COLOR_STOPS = [
  [130, '#22c55e'],
  [155, '#84cc16'],
  [170, '#eab308'],
  [185, '#f97316'],
  [200, '#ef4444']
];

let currentGasType = 'R\u00E9gulier';
let geojsonData = null;
let map = null;

function getVisiblePriceExtent() {
  const features = map.queryRenderedFeatures({ layers: ['station-point'] });

  const prices = features
          .map(f => Number(f.properties?._price))
          .filter(v => Number.isFinite(v));

  if (!prices.length) return null;

  return {
    min: Math.min(...prices),
    max: Math.max(...prices)
  };
}

function buildColorExpr(property, min, max) {
  if (min === max) {
    return [
      'case',
      ['==', ['get', property], min], '#eab308',
      '#52525b'
    ];
  }

  const mid = min + (max - min) / 2;

  return [
    'interpolate', ['linear'], ['get', property],
    min, '#22c55e',
    mid, '#eab308',
    max, '#ef4444'
  ];
}

function updateViewportColorScale() {
  const extent = getVisiblePriceExtent();
  if (!extent) return;

  const { min, max } = extent;

  map.setPaintProperty(
          'station-point',
          'circle-color',
          buildColorExpr('_price', min, max)
  );

  map.setPaintProperty(
          'clusters',
          'circle-color',
          buildColorExpr('min_price', min, max)
  );

  document.querySelector('.legend-gradient span:first-child').textContent = `${min.toFixed(1)}¢`;
  document.querySelector('.legend-gradient span:last-child').textContent = `${max.toFixed(1)}¢`;
  document.querySelector('.legend-gradient .bar').style.background =
          'linear-gradient(to right, #22c55e, #eab308, #ef4444)';
}

function priceColor(price) {
  if (price == null) return '#52525b';
  for (let i = COLOR_STOPS.length - 1; i >= 0; i--) {
    if (price >= COLOR_STOPS[i][0]) return COLOR_STOPS[i][1];
  }
  return COLOR_STOPS[0][1];
}

function preprocessData(geojson, gasType) {
  return {
    type: 'FeatureCollection',
    features: geojson.features
      .filter(f => f.geometry && f.geometry.coordinates)
      .map(f => {
        const match = (f.properties.Prices || []).find(p => p.GasType === gasType && p.IsAvailable);
        const price = match ? parseFloat(String(match.Price).replace(/[^0-9.]/g, '')) : null;
        return {
          type: 'Feature',
          geometry: f.geometry,
          properties: {
            ...f.properties,
            _price: price,
            Prices: JSON.stringify(f.properties.Prices || [])
          }
        };
      })
  };
}

function initMap() {
  map = new maplibregl.Map({
    container: 'map',
    style: {
      version: 8,
      sources: {
        'carto': {
          type: 'raster',
          tiles: ['https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'],
          tileSize: 256,
          attribution: '© CartoDB © OpenStreetMap'
        }
      },
      layers: [{ id: 'carto-tiles', type: 'raster', source: 'carto' }],
      glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf'
    },
    center: [-72.5, 47.0],
    zoom: 5.5,
    maxZoom: 18
  });

  map.addControl(new maplibregl.NavigationControl(), 'bottom-right');

  map.on('load', () => {
    loadData();
  });
}

async function loadData() {
  // Try loading the real dataset first, fall back to sample data
  let data;
  try {
    const resp = await fetch('https://regieessencequebec.ca/stations.geojson.gz');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    data = JSON.parse(text);
  } catch {
    console.warn('Failed to load real dataset, using sample data instead');
    data = generateSampleData();
  }

  geojsonData = data;
  applyData(currentGasType);
  updateViewportColorScale();
  document.getElementById('loading').classList.add('hidden');
}

function applyData(gasType) {
  const processed = preprocessData(geojsonData, gasType);
  document.getElementById('station-count').textContent = processed.features.length.toLocaleString('fr-CA');

  if (map.getSource('stations')) {
    map.removeLayer('clusters');
    map.removeLayer('cluster-label');
    map.removeLayer('station-point');
    map.removeLayer('station-label');
    map.removeSource('stations');
  }

  map.addSource('stations', {
    type: 'geojson',
    data: processed,
    cluster: true,
    clusterMaxZoom: 8,
    clusterRadius: 25,
    clusterProperties: {
      min_price: ['min', ['get', '_price']]
    }
  });

  const colorExpr = ['interpolate', ['linear'], ['get', 'min_price'],
    ...COLOR_STOPS.flatMap(([v, c]) => [v, c])
  ];

  const colorExprSingle = ['interpolate', ['linear'], ['get', '_price'],
    ...COLOR_STOPS.flatMap(([v, c]) => [v, c])
  ];

  // Cluster circles
  map.addLayer({
    id: 'clusters',
    type: 'circle',
    source: 'stations',
    // filter: ['has', 'point_count'],
    paint: {
      'circle-color': colorExpr,
      'circle-opacity': 0.85,
      'circle-radius': [
        'step', ['get', 'point_count'],
        18, 5, 22, 20, 28, 100, 36
      ],
      'circle-stroke-width': 2,
      'circle-stroke-color': 'rgba(0,0,0,0.3)'
    }
  });

  // Cluster label (min price)

  map.addLayer({
    id: 'cluster-label',
    type: 'symbol',
    source: 'stations',
    filter: ['has', 'point_count'],
    layout: {
      'text-field': [
        'concat',
         ['get', 'min_price'],
        '¢'
      ],
      'text-size': 24,
      //'text-font': ['Open Sans Regular'],
      'text-allow-overlap': true
    },
    paint: {
      'text-color': '#fff',
      'text-halo-color': 'rgba(0,0,0,0.6)',
      'text-halo-width': 1
    }
  });

  // Individual station points
  map.addLayer({
    id: 'station-point',
    type: 'circle',
    source: 'stations',
    filter: ['!', ['has', 'point_count']],
    paint: {
      'circle-color': colorExprSingle,
      'circle-radius': 7,
      'circle-stroke-width': 2,
      'circle-stroke-color': 'rgba(0,0,0,0.4)',
      'circle-opacity': 0.9
    }
  });

  // Individual station price label
  map.addLayer({
    id: 'station-label',
    type: 'symbol',
    source: 'stations',
    filter: ['!', ['has', 'point_count']],
    minzoom: 8,
    layout: {
      'text-field': [
        'concat',
        ['number-format', ['get', '_price'], { 'min-fraction-digits': 1, 'max-fraction-digits': 1 }],
        '¢'
      ],
      'text-size': 14,
      // 'text-font': ['Open Sans Regular'],
      'text-offset': [0, 1.6]
    },
    paint: {
      'text-color': '#e4e4e7',
      'text-halo-color': 'rgba(12,14,19,0.8)',
      'text-halo-width': 1
    }
  });

  map.on('moveend', updateViewportColorScale);
  map.on('zoomend', updateViewportColorScale);

  // Click: zoom into cluster
  map.on('click', 'clusters', (e) => {
    const features = map.queryRenderedFeatures(e.point, { layers: ['clusters'] });
    if (!features.length) return;
    const clusterId = features[0].properties.cluster_id;
    map.getSource('stations').getClusterExpansionZoom(clusterId, (err, zoom) => {
      if (err) return;
      map.easeTo({ center: features[0].geometry.coordinates, zoom: zoom });
    });
  });

  // Click: show station popup
  map.on('click', 'station-point', (e) => {
    const f = e.features[0];
    const props = f.properties;
    let prices;
    try { prices = JSON.parse(props.Prices); } catch { prices = []; }

    const priceRows = prices.map(p => {
      const isHighlight = p.GasType === gasType;
      return `<div class="popup-price-row ${isHighlight ? 'highlight' : ''}">
        <span class="popup-gas-type">${p.GasType}</span>
        <span class="popup-price-val">${p.Price}</span>
      </div>`;
    }).join('');

    new maplibregl.Popup({ offset: 12, maxWidth: '280px' })
      .setLngLat(f.geometry.coordinates)
      .setHTML(`
        <div class="popup-name">${props.Name || 'Station'}</div>
        <div class="popup-brand">${props.brand || ''}</div>
        <div class="popup-address">${props.Address || ''}</div>
        <div class="popup-prices">${priceRows}</div>
      `)
      .addTo(map);
  });

  // Cursor
  map.on('mouseenter', 'clusters', () => map.getCanvas().style.cursor = 'pointer');
  map.on('mouseleave', 'clusters', () => map.getCanvas().style.cursor = '');
  map.on('mouseenter', 'station-point', () => map.getCanvas().style.cursor = 'pointer');
  map.on('mouseleave', 'station-point', () => map.getCanvas().style.cursor = '');
}

// Gas type buttons
document.querySelectorAll('.gas-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.gas-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentGasType = btn.dataset.gas;
    if (geojsonData) applyData(currentGasType);
    updateViewportColorScale();
  });
});

// -- Sample data generator (fallback) --
function generateSampleData() {
  const regions = [
    { name: 'Montréal', center: [-73.57, 45.50], radius: 0.3, count: 180, priceBase: 165 },
    { name: 'Québec', center: [-71.21, 46.81], radius: 0.2, count: 80, priceBase: 170 },
    { name: 'Gatineau', center: [-75.70, 45.47], radius: 0.15, count: 50, priceBase: 168 },
    { name: 'Sherbrooke', center: [-71.89, 45.40], radius: 0.15, count: 40, priceBase: 172 },
    { name: 'Trois-Rivières', center: [-72.55, 46.35], radius: 0.1, count: 30, priceBase: 171 },
    { name: 'Saguenay', center: [-71.07, 48.43], radius: 0.2, count: 35, priceBase: 176 },
    { name: 'Rimouski', center: [-68.52, 48.45], radius: 0.15, count: 20, priceBase: 180 },
    { name: 'Abitibi', center: [-79.0, 48.1], radius: 0.4, count: 25, priceBase: 185 },
    { name: 'Côte-Nord', center: [-67.5, 49.2], radius: 0.5, count: 15, priceBase: 190 },
    { name: 'Laurentides', center: [-74.0, 46.1], radius: 0.3, count: 50, priceBase: 169 },
    { name: 'Lanaudière', center: [-73.5, 46.2], radius: 0.2, count: 35, priceBase: 170 },
    { name: 'Estrie', center: [-71.5, 45.3], radius: 0.25, count: 30, priceBase: 173 },
    { name: 'Bas-Saint-Laurent', center: [-69.0, 47.8], radius: 0.4, count: 25, priceBase: 178 },
    { name: 'Beauce', center: [-70.8, 46.1], radius: 0.2, count: 25, priceBase: 174 },
    { name: 'Gaspésie', center: [-65.5, 48.8], radius: 0.5, count: 20, priceBase: 192 },
  ];

  const brands = ['Ultramar', 'Petro-Canada', 'Shell', 'Esso', 'Couche-Tard', 'Canadian Tire', 'Costco', 'Harnois', 'Sonic', 'Aucun'];
  const streetNames = ['boul. des Laurentides', 'rue Principale', 'route 138', 'ch. Sainte-Foy', 'av. du Pont', 'boul. Saint-Joseph', 'rue King', 'route 117', 'boul. Taschereau', 'rue Sherbrooke'];

  const features = [];
  let id = 1;

  for (const region of regions) {
    for (let i = 0; i < region.count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.sqrt(Math.random()) * region.radius;
      const lng = region.center[0] + Math.cos(angle) * dist;
      const lat = region.center[1] + Math.sin(angle) * dist * 0.7;

      const regPrice = region.priceBase + (Math.random() - 0.5) * 30;
      const superPrice = regPrice + 15 + Math.random() * 15;
      const dieselPrice = regPrice + 20 + Math.random() * 20;

      features.push({
        type: 'Feature',
        geometry: { type: 'Point', coordinates: [lng, lat] },
        properties: {
          Name: `${brands[Math.floor(Math.random() * brands.length)]} — Station ${id}`,
          brand: brands[Math.floor(Math.random() * brands.length)],
          Status: 'En opération',
          Address: `${Math.floor(Math.random() * 9000) + 100} ${streetNames[Math.floor(Math.random() * streetNames.length)]}`,
          Region: region.name,
          Prices: [
            { GasType: 'Régulier', Price: `${regPrice.toFixed(1)}¢`, IsAvailable: true },
            { GasType: 'Super', Price: `${superPrice.toFixed(1)}¢`, IsAvailable: Math.random() > 0.1 },
            { GasType: 'Diesel', Price: `${dieselPrice.toFixed(1)}¢`, IsAvailable: Math.random() > 0.05 }
          ]
        }
      });
      id++;
    }
  }

  return { type: 'FeatureCollection', features };
}

initMap();
</script>
</body>
</html>
